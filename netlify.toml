[build]
  command = "echo 'Netlify build'"
  functions = "netlify/functions"
  publish = "public"

[dev]
  command = "npm run dev:frontend"
  targetPort = 8080

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
